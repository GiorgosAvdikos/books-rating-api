spring:
  datasource:
    url: jdbc:sqlite:file:testdb?mode=memory&cache=shared
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    show-sql: true

  sql:
    init:
      mode: always

app:
  open-browser: false